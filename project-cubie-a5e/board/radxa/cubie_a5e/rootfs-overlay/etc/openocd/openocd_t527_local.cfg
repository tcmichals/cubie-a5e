# openocd_t527_local.cfg — T527 XuanTie E906/E907 Debug Configuration
#
# This OpenOCD configuration uses the ARM CoreSight Debug Access Port (DAP)
# already present in the A55 cluster to reach the XuanTie RISC-V debug module
# at physical address 0x07090000.
#
# Transport: sysfsgpio (Linux sysfs GPIO bitbang JTAG — no external hardware)
# Requires:  CONFIG_GPIOLIB=y (already present in Allwinner kernel)
#            BR2_PACKAGE_OPENOCD_SYSFS=y (enabled in cubie_a5e_defconfig)
#
# Usage on target (ARM Linux):
#   openocd -f /etc/openocd/openocd_t527_local.cfg
#
# Then connect from your x86 dev host:
#   riscv-none-elf-gdb firmware.elf
#   (gdb) target remote cubie-a5e:3333

# ---- Adapter: sysfsgpio bitbang over Linux sysfs ----
# GPIO numbers are SoC-specific. These map the T527 debug pins.
# Adjust to match the physical header pins you have wired to the debug connector.
interface sysfsgpio
sysfsgpio_tck_num   228   # PA4  — TCK
sysfsgpio_tms_num   229   # PA5  — TMS
sysfsgpio_tdi_num   230   # PA6  — TDI
sysfsgpio_tdo_num   231   # PA7  — TDO (input)

adapter speed 1000    # 1 MHz — safe starting speed for bitbang

transport select jtag

# ---- Target: Allwinner T527 ARM DAP ----
# The ARM Cortex-A55 cluster exposes a CoreSight DAP that includes
# an AHB-AP (Access Port 0) giving bus-level access to the entire
# SoC address space including the RISC-V debug module.
set _CHIPNAME   t527
set _DAP_TAPID  0x6ba00477   # ARM Cortex-A55 JTAG IDCODE

jtag newtap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_TAPID

dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# ---- RISC-V target via AHB-AP ----
# XuanTie debug module base (AHB-accessible from ARM host): 0x07090000
set _RISCV_DBG  0x07090000

target create $_CHIPNAME.riscv riscv \
    -dap        $_CHIPNAME.dap \
    -ap-num     0             \
    -dbgbase    $_RISCV_DBG   \
    -coreid     0

# ---- GDB / telnet / TCL server ports ----
gdb_port    3333
telnet_port 4444
tcl_port    6666

# ---- Reset: use debug module ndmreset, not SRST ----
reset_config none

# ---- Init ----
init
echo ""
echo "=== T527 XuanTie E906/E907 debug bridge ready ==="
echo "    GDB:    target remote <cubie-ip>:3333"
echo "    telnet: telnet <cubie-ip> 4444"
echo ""
echo "Halting co-processor..."
halt
echo "Core halted. Ready for GDB."
